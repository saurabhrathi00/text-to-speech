<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SastaSpeech{% endblock %}</title>
  <meta name="description" content="{% block description %}SastaSpeech — sasta, mast Hindi text-to-speech. Studio-quality Hindi & Hinglish voiceovers for creators from ₹49.{% endblock %}" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="{{ canonical_host }}{{ request.path }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    .legal-shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 64px;
      position: relative;
      z-index: 1;
    }
    .legal-shell h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
      background: linear-gradient(135deg, #c7d2fe, #f9a8d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .legal-shell .updated { color: #94a3b8; font-size: 0.85rem; margin-bottom: 28px; }
    .legal-shell h2 { font-size: 1.15rem; margin: 28px 0 10px; color: #f8fafc; }
    .legal-shell p, .legal-shell li { line-height: 1.65; color: #cbd5e1; }
    .legal-shell ul, .legal-shell ol { padding-left: 22px; }
    .legal-shell a { color: #a5b4fc; }
    .legal-nav {
      margin-top: 40px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      font-size: 0.88rem;
    }
    .legal-nav a { color: #94a3b8; text-decoration: none; }
    .legal-nav a:hover { color: #c7d2fe; text-decoration: underline; }
    .legal-back { display: inline-block; margin-bottom: 24px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    .legal-back:hover { color: #c7d2fe; }
    .legal-todo {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 6px;
      color: #fbbf24;
      font-size: 0.78rem;
      font-weight: 600;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true">
    <div class="login-bg-blob blob-a"></div>
    <div class="login-bg-blob blob-b"></div>
  </div>

  <main class="legal-shell">
    <a class="legal-back" href="/">← Back to SastaSpeech</a>
    {% block content %}{% endblock %}

    <nav class="legal-nav">
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/refund">Refund Policy</a>
      <a href="/faq">FAQ</a>
    </nav>
  </main>
</body>
</html>
