<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouTube Narrator</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#312e81" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Narrator" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>🎙️ YouTube Narrator</h1>
      <p class="subtitle">Papa ke liye — Local & Free</p>
    </header>

    <section class="card">
      <label for="script" class="label">Apna script likhein (Hindi / Hinglish / English)</label>
      <textarea id="script" rows="12" placeholder="Aaj hum baat karenge photosynthesis ke baare mein..."></textarea>

      <details class="voice-controls">
        <summary>🎚️ Voice tune karein (advanced)</summary>
        <div class="controls-grid">
          <div class="control">
            <label for="speaker">Speaker</label>
            <select id="speaker">
              <option value="rohit" selected>Rohit (deep male)</option>
              <option value="aman">Aman (young male)</option>
              <option value="divya">Divya (warm female)</option>
              <option value="rani">Rani (news anchor)</option>
            </select>
          </div>
          <div class="control">
            <label for="speed">Speed</label>
            <select id="speed">
              <option value="slow">Slow</option>
              <option value="moderate" selected>Moderate</option>
              <option value="fast">Fast</option>
            </select>
          </div>
          <div class="control">
            <label for="pitch">Pitch</label>
            <select id="pitch">
              <option value="low" selected>Low / Deep</option>
              <option value="normal">Normal</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="control">
            <label for="expressivity">Tone</label>
            <select id="expressivity">
              <option value="expressive" selected>Expressive</option>
              <option value="neutral">Neutral</option>
              <option value="calm">Calm</option>
            </select>
          </div>
        </div>
        <div class="control full">
          <label for="customDesc">Custom description (optional — overrides above)</label>
          <textarea id="customDesc" rows="2" placeholder="e.g. Rohit speaks slowly with a deep voice..."></textarea>
        </div>
      </details>

      <label class="checkbox-row">
        <input type="checkbox" id="skipNormalize" />
        <span>Qwen skip karo — mera text bilkul exact bolo (no auto-correction)</span>
      </label>

      <button id="generateBtn" class="primary">🎵 Awaaz Banao</button>

      <div id="status" class="status hidden">
        <div class="spinner"></div>
        <span id="statusText">Awaaz ban rahi hai...</span>
      </div>

      <div id="error" class="error hidden"></div>
    </section>

    <section id="resultSection" class="card hidden">
      <label class="label" for="normalizedEdit">Normalized text — yahan edit karke dobara bana sakte ho</label>
      <textarea id="normalizedEdit" rows="4" class="normalized-edit"></textarea>
      <button id="regenBtn" class="secondary">🔁 Is text se dobara banao</button>

      <div id="karaoke" class="karaoke hidden"></div>

      <div class="player-row">
        <audio id="audioPlayer" controls></audio>
        <a id="downloadBtn" class="primary download" download>📥 Download .wav</a>
      </div>
    </section>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    const btn = document.getElementById('generateBtn');
    const regenBtn = document.getElementById('regenBtn');
    const scriptEl = document.getElementById('script');
    const skipEl = document.getElementById('skipNormalize');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const errorEl = document.getElementById('error');
    const result = document.getElementById('resultSection');
    const normalizedEdit = document.getElementById('normalizedEdit');
    const audio = document.getElementById('audioPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    const karaoke = document.getElementById('karaoke');

    let currentWords = [];
    let activeIdx = -1;

    function renderKaraoke(words) {
      currentWords = words || [];
      karaoke.innerHTML = '';
      activeIdx = -1;
      if (!currentWords.length) {
        karaoke.classList.add('hidden');
        return;
      }
      currentWords.forEach((w, i) => {
        const span = document.createElement('span');
        span.className = 'kw';
        span.textContent = w.word;
        span.dataset.i = i;
        span.addEventListener('click', () => {
          audio.currentTime = w.start;
          audio.play();
        });
        karaoke.appendChild(span);
        karaoke.appendChild(document.createTextNode(' '));
      });
      karaoke.classList.remove('hidden');
    }

    audio.addEventListener('timeupdate', () => {
      if (!currentWords.length) return;
      const t = audio.currentTime;
      let idx = -1;
      for (let i = 0; i < currentWords.length; i++) {
        if (t >= currentWords[i].start && t < currentWords[i].end) { idx = i; break; }
        if (t < currentWords[i].start) { idx = Math.max(0, i - 1); break; }
        if (i === currentWords.length - 1 && t >= currentWords[i].end) idx = i;
      }
      if (idx === activeIdx) return;
      if (activeIdx >= 0) karaoke.children[activeIdx]?.classList.remove('active');
      activeIdx = idx;
      if (activeIdx >= 0) {
        const el = karaoke.children[activeIdx];
        el?.classList.add('active');
        el?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    });

    audio.addEventListener('ended', () => {
      if (activeIdx >= 0) karaoke.children[activeIdx]?.classList.remove('active');
      activeIdx = -1;
    });

    function getVoice() {
      return {
        speaker: document.getElementById('speaker').value,
        speed: document.getElementById('speed').value,
        pitch: document.getElementById('pitch').value,
        expressivity: document.getElementById('expressivity').value,
        custom: document.getElementById('customDesc').value.trim(),
      };
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }
    function clearError() { errorEl.classList.add('hidden'); errorEl.textContent = ''; }
    function setLoading(on) {
      btn.disabled = on;
      regenBtn.disabled = on;
      status.classList.toggle('hidden', !on);
    }

    btn.addEventListener('click', async () => {
      const text = scriptEl.value.trim();
      clearError();
      result.classList.add('hidden');
      if (!text) { showError('Pehle kuch type karein'); return; }

      const skip = skipEl.checked;
      setLoading(true);
      statusText.textContent = skip ? 'Awaaz ban rahi hai...' : 'Qwen text ko clean kar raha hai...';
      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, voice: getVoice(), skip_normalize: skip })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Kuch galat ho gaya, dobara koshish karein'); return; }

        normalizedEdit.value = data.normalized_text;
        audio.src = data.audio_url;
        downloadBtn.href = data.audio_url;
        renderKaraoke(data.words);
        result.classList.remove('hidden');
      } catch (e) {
        showError('Server se connect nahi ho paya');
      } finally {
        setLoading(false);
      }
    });

    regenBtn.addEventListener('click', async () => {
      const text = normalizedEdit.value.trim();
      clearError();
      if (!text) { showError('Normalized text khali hai'); return; }

      setLoading(true);
      statusText.textContent = 'Edited text se awaaz bana raha hai...';
      try {
        const res = await fetch('/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, voice: getVoice() })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Kuch galat ho gaya'); return; }
        audio.src = data.audio_url;
        downloadBtn.href = data.audio_url;
        renderKaraoke(data.words);
      } catch (e) {
        showError('Server se connect nahi ho paya');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
