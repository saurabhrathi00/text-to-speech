<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouTube Narrator</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#312e81" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Narrator" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>🎙️ YouTube Narrator</h1>
      <p class="subtitle">Papa ke liye — Local & Free</p>
    </header>

    <section class="card">
      <div class="provider-toggle">
        <button type="button" class="prov-btn active" data-provider="parler">💻 Parler</button>
        <button type="button" class="prov-btn" data-provider="bark">🎭 Bark</button>
        <button type="button" class="prov-btn" data-provider="elevenlabs">☁️ ElevenLabs</button>
      </div>
      <p id="providerNote" class="provider-note hidden"></p>

      <label for="script" class="label">Apna script likhein (Hindi / Hinglish / English)</label>
      <textarea id="script" rows="12" placeholder="Aaj hum baat karenge photosynthesis ke baare mein..."></textarea>

      <details class="voice-controls" open>
        <summary>🎚️ Voice tune karein</summary>
        <div class="controls-grid">
          <div class="control">
            <label for="speaker">Voice</label>
            <select id="speaker"></select>
          </div>
          <div class="control parler-only">
            <label for="speed">Speed</label>
            <select id="speed">
              <option value="slow">Slow</option>
              <option value="moderate" selected>Moderate</option>
              <option value="fast">Fast</option>
            </select>
          </div>
          <div class="control parler-only">
            <label for="pitch">Pitch</label>
            <select id="pitch">
              <option value="low" selected>Low / Deep</option>
              <option value="normal">Normal</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="control parler-only">
            <label for="expressivity">Tone</label>
            <select id="expressivity">
              <option value="expressive" selected>Expressive</option>
              <option value="neutral">Neutral</option>
              <option value="calm">Calm</option>
            </select>
          </div>
        </div>
        <div class="control full parler-only">
          <label for="customDesc">Custom description (optional — overrides above)</label>
          <textarea id="customDesc" rows="2" placeholder="e.g. Rohit speaks slowly with a deep voice..."></textarea>
        </div>
      </details>

      <label class="checkbox-row tag-toggle-row">
        <input type="checkbox" id="emotionTags" />
        <span>🎭 Emotion tags add karo — Qwen classify karega aur tags lagayega</span>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="skipNormalize" />
        <span>Qwen skip karo — mera text bilkul exact bolo (no auto-correction)</span>
      </label>

      <button id="generateBtn" class="primary">🎵 Awaaz Banao</button>

      <div id="status" class="status hidden">
        <div class="spinner"></div>
        <span id="statusText">Awaaz ban rahi hai...</span>
      </div>

      <div id="error" class="error hidden"></div>
    </section>

    <section class="card image-card">
      <header class="image-header">
        <span>🎨 Image generation (ComfyUI + SDXL)</span>
        <span id="comfyStatus" class="comfy-status">checking...</span>
      </header>
      <label class="label" for="imagePrompt">Image prompt (English works best)</label>
      <textarea id="imagePrompt" rows="3" placeholder="A small Indian village at dawn, mud houses, soft golden light, photorealistic, cinematic"></textarea>
      <div class="image-controls">
        <button type="button" id="imageBtn" class="primary">🖼️ Generate Image</button>
        <span id="imageStatus" class="image-status hidden">
          <span class="spinner"></span>
          <span>Banayi ja rahi hai (~15-30 sec)...</span>
        </span>
      </div>
      <div id="imageError" class="error hidden"></div>
      <div id="imageResult" class="image-result hidden">
        <img id="imagePreview" alt="generated image" />
        <a id="imageDownload" class="secondary" download>📥 Download</a>
      </div>
    </section>

    <section id="resultSection" class="card hidden">
      <label class="label" for="normalizedEdit">Normalized text — yahan edit karke dobara bana sakte ho</label>
      <textarea id="normalizedEdit" rows="4" class="normalized-edit"></textarea>
      <button id="regenBtn" class="secondary">🔁 Is text se dobara banao</button>

      <div class="player-row">
        <audio id="audioPlayer" controls></audio>
        <a id="downloadBtn" class="primary download" download>📥 Download .wav</a>
      </div>
    </section>
  </main>

  <script>
    // ── Image generation section ─────────────────────────────────────
    const imageBtn = document.getElementById('imageBtn');
    const imagePromptEl = document.getElementById('imagePrompt');
    const imageStatus = document.getElementById('imageStatus');
    const imageError = document.getElementById('imageError');
    const imageResult = document.getElementById('imageResult');
    const imagePreview = document.getElementById('imagePreview');
    const imageDownload = document.getElementById('imageDownload');
    const comfyStatus = document.getElementById('comfyStatus');

    function refreshComfyStatus() {
      fetch('/api/image/status').then(r => r.json()).then(s => {
        if (s.comfy_reachable) {
          comfyStatus.textContent = '🟢 connected';
          comfyStatus.className = 'comfy-status ok';
        } else {
          comfyStatus.textContent = '🔴 not running';
          comfyStatus.className = 'comfy-status bad';
        }
      }).catch(() => {
        comfyStatus.textContent = '⚠️ unknown';
      });
    }
    refreshComfyStatus();
    setInterval(refreshComfyStatus, 15000);

    imageBtn.addEventListener('click', async () => {
      const prompt = imagePromptEl.value.trim();
      imageError.classList.add('hidden');
      imageResult.classList.add('hidden');
      if (!prompt) { imageError.textContent = 'Pehle prompt likhein'; imageError.classList.remove('hidden'); return; }

      imageBtn.disabled = true;
      imageStatus.classList.remove('hidden');
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 10 * 60 * 1000);
      try {
        const res = await fetch('/api/image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
          signal: ctrl.signal,
        });
        const data = await res.json();
        if (!res.ok) {
          imageError.textContent = data.error || 'Image generate nahi hui';
          imageError.classList.remove('hidden');
          return;
        }
        imagePreview.src = data.image_url;
        imageDownload.href = data.image_url;
        imageResult.classList.remove('hidden');
      } catch (e) {
        imageError.textContent = 'Server se connect nahi ho paya / timeout';
        imageError.classList.remove('hidden');
      } finally {
        clearTimeout(timer);
        imageStatus.classList.add('hidden');
        imageBtn.disabled = false;
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    const btn = document.getElementById('generateBtn');
    const regenBtn = document.getElementById('regenBtn');
    const scriptEl = document.getElementById('script');
    const skipEl = document.getElementById('skipNormalize');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const errorEl = document.getElementById('error');
    const result = document.getElementById('resultSection');
    const normalizedEdit = document.getElementById('normalizedEdit');
    const audio = document.getElementById('audioPlayer');
    const downloadBtn = document.getElementById('downloadBtn');

    let activeProvider = 'parler';
    let providerCaps = { emotions_supported: false };
    const providerNote = document.getElementById('providerNote');
    const speakerSelect = document.getElementById('speaker');

    async function loadVoicesFor(provider) {
      try {
        const res = await fetch(`/api/providers/${provider}/voices`);
        const data = await res.json();
        speakerSelect.innerHTML = '';
        (data.voices || []).forEach((v, i) => {
          const opt = document.createElement('option');
          opt.value = v.id;
          opt.textContent = v.label;
          if (i === 0) opt.selected = true;
          speakerSelect.appendChild(opt);
        });
        providerCaps = data;
        document.querySelectorAll('.parler-only').forEach(el => {
          el.style.display = (provider === 'parler') ? '' : 'none';
        });
        // Emotion tags toggle: visible only when provider supports inline tags
        const supportsTags = (provider === 'elevenlabs' || provider === 'bark');
        document.querySelector('.tag-toggle-row').style.display = supportsTags ? '' : 'none';
        if (!supportsTags) {
          document.getElementById('emotionTags').checked = false;
        }
      } catch (e) {
        showError('Voice list load nahi hua');
      }
    }

    async function setProvider(provider) {
      activeProvider = provider;
      document.querySelectorAll('.prov-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.provider === provider);
      });
      if (provider === 'elevenlabs') {
        const r = await fetch('/api/providers');
        const info = await r.json();
        if (!info.elevenlabs_configured) {
          providerNote.textContent = '⚠️ ELEVENLABS_API_KEY .env mein set nahi hai. Generate fail hoga.';
        } else {
          providerNote.textContent = 'ElevenLabs API mode — emotions supported, billing active.';
        }
        providerNote.classList.remove('hidden');
      } else if (provider === 'bark') {
        providerNote.textContent = 'Bark local mode — slow on first request (~2-3 min for model load + ~30s per chunk). Hindi voices ka quality variable.';
        providerNote.classList.remove('hidden');
      } else {
        providerNote.classList.add('hidden');
      }
      await loadVoicesFor(provider);
    }

    document.querySelectorAll('.prov-btn').forEach(btn => {
      btn.addEventListener('click', () => setProvider(btn.dataset.provider));
    });

    // On page load, sync UI with .env's default provider
    fetch('/api/providers').then(r => r.json()).then(info => {
      setProvider(info.current);
    });

    function getVoice() {
      return {
        speaker: speakerSelect.value,
        voice_id: speakerSelect.value,
        speed: document.getElementById('speed').value,
        pitch: document.getElementById('pitch').value,
        expressivity: document.getElementById('expressivity').value,
        emotion: 'none',
        custom: document.getElementById('customDesc').value.trim(),
      };
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }
    function clearError() { errorEl.classList.add('hidden'); errorEl.textContent = ''; }
    function setLoading(on) {
      btn.disabled = on;
      regenBtn.disabled = on;
      status.classList.toggle('hidden', !on);
    }

    const emotionTagsEl = document.getElementById('emotionTags');

    btn.addEventListener('click', async () => {
      const text = scriptEl.value.trim();
      clearError();
      result.classList.add('hidden');
      if (!text) { showError('Pehle kuch type karein'); return; }

      const skip = skipEl.checked;
      const useEmotionTags = emotionTagsEl.checked;
      setLoading(true);
      statusText.textContent = skip ? 'Awaaz ban rahi hai...' : 'Qwen text ko clean kar raha hai...';
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 15 * 60 * 1000);
        let res;
        try {
          res = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              text,
              voice: getVoice(),
              skip_normalize: skip,
              provider: activeProvider,
              emotion_tags: useEmotionTags,
            }),
            signal: ctrl.signal,
          });
        } finally {
          clearTimeout(timer);
        }
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Kuch galat ho gaya, dobara koshish karein'); return; }

        normalizedEdit.value = data.normalized_text;
        audio.src = data.audio_url;
        downloadBtn.href = data.audio_url;
        result.classList.remove('hidden');
      } catch (e) {
        showError('Server se connect nahi ho paya');
      } finally {
        setLoading(false);
      }
    });

    regenBtn.addEventListener('click', async () => {
      const text = normalizedEdit.value.trim();
      clearError();
      if (!text) { showError('Normalized text khali hai'); return; }

      setLoading(true);
      statusText.textContent = 'Edited text se awaaz bana raha hai...';
      try {
        const res = await fetch('/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            voice: getVoice(),
            provider: activeProvider,
            emotion_tags: emotionTagsEl.checked,
          })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Kuch galat ho gaya'); return; }
        audio.src = data.audio_url;
        downloadBtn.href = data.audio_url;
      } catch (e) {
        showError('Server se connect nahi ho paya');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
