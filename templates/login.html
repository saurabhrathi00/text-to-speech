<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SastaSpeech — Login</title>
  <meta name="theme-color" content="#312e81" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>🎙️ SastaSpeech</h1>
      <p class="subtitle">Sasta + Mast Text to Speech</p>
    </header>

    <div id="authChecking" class="card auth-checking">
      <div class="spinner"></div>
      <span>Checking session...</span>
    </div>

    <section id="authCard" class="card hidden">
      <h2 class="auth-heading">Sign in</h2>

      <button type="button" id="googleAuthBtn" class="auth-google">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.205c0-.638-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        <span>Continue with Google</span>
      </button>

      <div class="auth-divider"><span>or sign in with email</span></div>

      <label class="label" for="email">Email</label>
      <input type="email" id="email" class="auth-input" placeholder="you@example.com" autocomplete="email" />

      <label class="label" for="password">Password</label>
      <input type="password" id="password" class="auth-input" placeholder="your password" autocomplete="current-password" />

      <button type="button" id="authBtn" class="primary auth-submit">Sign in</button>

      <p id="authStatus" class="auth-status hidden"></p>
      <p id="authError" class="error hidden"></p>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = {{ supabase.url | tojson }};
    const SUPABASE_ANON_KEY = {{ supabase.anon_key | tojson }};
    const AUTH_DISABLED = {{ supabase.auth_disabled | tojson }};

    if (AUTH_DISABLED) {
      // Local-only mode — bounce straight to the app.
      window.location.href = '/';
    }
    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      document.getElementById('authError').textContent =
        'Server not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY in .env.';
      document.getElementById('authError').classList.remove('hidden');
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Decide whether to show the form or redirect — keep both hidden
    // until we know. Avoids the auth-form flash before redirect.
    const checkingEl = document.getElementById('authChecking');
    const cardEl = document.getElementById('authCard');

    function revealForm(errorMessage) {
      checkingEl.classList.add('hidden');
      cardEl.classList.remove('hidden');
      if (errorMessage) {
        const errEl = document.getElementById('authError');
        errEl.textContent = errorMessage;
        errEl.classList.remove('hidden');
      }
    }

    const { data: existing } = await supabase.auth.getSession();
    if (existing?.session) {
      try {
        const probe = await fetch('/api/me', {
          headers: { Authorization: 'Bearer ' + existing.session.access_token },
        });
        if (probe.ok) {
          window.location.replace('/');  // no history entry
        } else {
          const body = await probe.json().catch(() => ({}));
          await supabase.auth.signOut();
          revealForm('Session backend ne reject ki: ' + (body.error || probe.status)
            + ' — sign in dobara karo.');
        }
      } catch (e) {
        await supabase.auth.signOut();
        revealForm();
      }
    } else {
      revealForm();
    }

    // Sign-up is intentionally not exposed in the UI. New users come
    // through 'Continue with Google'; email/password is left as a
    // sign-in option for legacy accounts created before Google OAuth
    // was wired up. supabase.auth.signUp is still reachable for an
    // admin who wants to create an account out-of-band.
    const authBtn = document.getElementById('authBtn');
    const emailEl = document.getElementById('email');
    const passEl = document.getElementById('password');
    const errEl = document.getElementById('authError');
    const statusEl = document.getElementById('authStatus');

    function showError(msg) {
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
      statusEl.classList.add('hidden');
    }
    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.remove('hidden');
      errEl.classList.add('hidden');
    }

    authBtn.addEventListener('click', async () => {
      const email = emailEl.value.trim();
      const password = passEl.value;
      errEl.classList.add('hidden');
      if (!email || !password) {
        showError('Email aur password dono required hain');
        return;
      }
      authBtn.disabled = true;
      authBtn.textContent = 'Signing in...';
      try {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { showError(error.message); return; }
        window.location.href = '/';
      } catch (e) {
        showError(e.message || 'Something went wrong');
      } finally {
        authBtn.disabled = false;
        authBtn.textContent = 'Sign in';
      }
    });

    // Google OAuth. Supabase handles the redirect dance — we just say
    // "where to come back" via redirectTo. Make sure the Site URL +
    // redirect URLs are registered in Supabase Auth → URL Configuration,
    // and the Google provider is enabled with valid OAuth creds.
    const googleBtn = document.getElementById('googleAuthBtn');
    googleBtn.addEventListener('click', async () => {
      errEl.classList.add('hidden');
      googleBtn.disabled = true;
      googleBtn.querySelector('span').textContent = 'Redirecting...';
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/' },
        });
        if (error) {
          showError(error.message);
          googleBtn.disabled = false;
          googleBtn.querySelector('span').textContent = 'Continue with Google';
        }
        // Success path: browser is already redirecting to Google.
      } catch (e) {
        showError(e.message || 'Could not start Google sign-in');
        googleBtn.disabled = false;
        googleBtn.querySelector('span').textContent = 'Continue with Google';
      }
    });
  </script>
</body>
</html>
